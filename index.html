<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./CSS/output.css">
    <title>Fylo Dark Theme Landing Page</title>
</head>
<body class="bg-dark-blue-main font-body text-white">
    <!-- Header -->
    <header class="container mx-auto px-6 py-10 flex flex-col items-center justify-between space-y-7 md:flex-row md:space-y-0">
        <!-- Logo -->
        <div class="w-24 md:w-32">
            <img src="./images/logo.svg" alt="Fylo Logo" class="w-full">
        </div>
        
        <!-- Navigation -->
        <nav class="flex items-center space-x-6 font-headings md:space-x-10">
            <a href="#features" class="hover:text-cyan transition-colors">Features</a>
            <a href="#team" class="hover:text-cyan transition-colors">Team</a>
            <a href="#signin" class="hover:text-cyan transition-colors">Sign In</a>
        </nav>
    </header>

    <!-- Hero Section -->
    <section id="hero" class="bg-dark-blue-intro bg-no-repeat bg-bottom pb-32">
        <div class="container mx-auto px-6 text-center">
            <!-- Hero Image -->
            <img src="./images/illustration-intro.png" alt="Intro Illustration" class="mx-auto mb-10">
            
            <!-- Hero Content -->
            <div class="max-w-3xl mx-auto">
                <h1 class="text-3xl font-bold mb-6 md:text-4xl md:leading-normal">
                    All your files in one secure location, accessible anywhere.
                </h1>
                <p class="text-lg mb-8 md:text-xl md:px-20">
                    Fylo stores all your most important files in one secure location. Access them wherever you need, share and collaborate with friends family, and co-workers.
                </p>
                <button class="btn-gradient px-20 py-4 text-lg md:px-24">
                    Get Started
                </button>
            </div>
        </div>
    </section>

    <!-- Curvy Background Container -->
    <div class="bg-curvy-mobile md:bg-curvy-desktop bg-no-repeat bg-contain bg-bottom h-24 md:h-48 -mt-24 md:-mt-48"></div>

    <main>
        <!-- Future Sections -->
    </main>

</body>
</html>
