<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./CSS/output.css" />
    <title>Fylo - Secure File Storage</title>
    <!-- Theme Detection (Critical Path) -->
    <script src="./js/script.js" defer></script>
    <script src="./js/theme-detect.js"></script>
  </head>
  <body
    class="bg-slate-100 dark:bg-dark-blue-main text-slate-900 dark:text-white transition-colors duration-300"
  >
    <!-- Header -->
    <header
      class="container mx-auto px-6 py-10 flex items-center justify-between"
    >
      <!-- Logo -->
      <div class="w-24 md:w-32">
        <img
          src="./images/logo.svg"
          alt="Fylo Logo"
          class="theme-icon w-full"
        />
      </div>

      <!-- Navigation & Toggle -->
      <div class="flex items-center space-x-6 font-headings md:space-x-10">
        <nav class="flex items-center space-x-6 md:space-x-10">
          <a href="#features" class="hover:text-cyan transition-colors"
            >Features</a
          >
          <a href="#testimonials" class="hover:text-cyan transition-colors"
            >Testimonials</a
          >
        </nav>

        <!-- Theme Toggle Button -->
        <button
          id="theme-toggle"
          class="p-2 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors"
        >
          <!-- Dark Icon (Moon) -->
          <svg
            id="theme-toggle-dark-icon"
            class="hidden w-5 h-5"
            fill="currentColor"
            viewBox="0 0 20 20"
          >
            <path
              d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"
            ></path>
          </svg>
          <!-- Light Icon (Sun) -->
          <svg
            id="theme-toggle-light-icon"
            class="hidden w-5 h-5"
            fill="currentColor"
            viewBox="0 0 20 20"
          >
            <path
              d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"
            ></path>
          </svg>
        </button>
      </div>
    </header>
  </body>
</html>
